# =============================================================================
# kitty.conf
# =============================================================================

# Font
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0

# Cursor
cursor_shape     block
cursor_blink_interval 0

# Window
window_padding_width 12
hide_window_decorations yes
background_opacity 0.95

# Tab bar
tab_bar_style    powerline
tab_powerline_style round

# =============================================================================
# Colors — Ayu Dark
# =============================================================================
background  #0d1017
foreground  #bfbdb6
cursor      #e6b450

selection_background #273747
selection_foreground #bfbdb6

# Black
color0  #131721
color8  #3d4b5c

# Red
color1  #ea6c73
color9  #ff8f40

# Green
color2  #91b362
color10 #7fd962

# Yellow
color3  #f9af4f
color11 #e6b673

# Blue
color4  #53bdfa
color12 #59c2ff

# Magenta
color5  #cba6f7
color13 #d2a6ff

# Cyan
color6  #90e1c6
color14 #95e6cb

# White
color7  #c7c7c7
