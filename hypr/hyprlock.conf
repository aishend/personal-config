# #####################################################################
# HYPRLOCK CONFIGURATION
# Screen locker for Hyprland
# #####################################################################

# ---------------------------------------------------------------------
# 1. BACKGROUND
# ---------------------------------------------------------------------
# Takes a screenshot of the current state and applies a blur effect
background {
    monitor =
    path = screenshot
    blur_passes = 2
}

# ---------------------------------------------------------------------
# 2. PASSWORD INPUT FIELD
# ---------------------------------------------------------------------
# Configuration for the password entry box
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33 
    dots_spacing = 0.15
    fade_on_empty = false
}