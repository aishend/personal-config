# #####################################################################
# HYPRIDLE CONFIGURATION
# Idle management daemon for Hyprland
# #####################################################################

general {
    lock_cmd = pidof hyprlock || hyprlock       # Command that actually locks the session
    before_sleep_cmd = loginctl lock-session    # Ensures lock BEFORE the PC suspends/lid closes
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms("on")'  # Ensures the screen turns on when waking up
}

# ---------------------------------------------------------------------
# 1. WARNING (4 minutes / 240 seconds)
# ---------------------------------------------------------------------
# Dims the screen brightness to warn the user before locking
listener {
    timeout = 240
    on-timeout = brightnessctl set 10%
    on-resume = brightnessctl set 100%
}

# ---------------------------------------------------------------------
# 2. LOCK & DISPLAY OFF (10 minutes / 600 seconds)
# ---------------------------------------------------------------------
# Locks the PC and turns off the monitors completely
listener {
    timeout = 600
    on-timeout = loginctl lock-session && hyprctl dispatch 'hl.dsp.dpms("off")'
    on-resume = hyprctl dispatch 'hl.dsp.dpms("on")'
}